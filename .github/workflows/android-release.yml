name: Android Release APK

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      auto_start_date:
        description: "Reading start date used by static generator (YYYY-MM-DD)"
        required: false
        default: "2026-03-07"

permissions:
  contents: write
  actions: write

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    env:
      DEFAULT_START_DATE: "2026-03-07"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install npm dependencies
        run: npm install

      - name: Resolve build metadata
        id: meta
        shell: bash
        run: |
          APP_NAME=$(node -p "require('./app_config.json').app_name")
          APP_ID=$(node -p "require('./app_config.json').app_id")
          APP_VERSION=$(node -p "require('./app_config.json').version")
          APP_SLUG=$(echo "$APP_NAME" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9.-')
          if [ -z "$APP_SLUG" ]; then APP_SLUG="android-app"; fi

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            RELEASE_VERSION="${GITHUB_REF_NAME#v}"
            RELEASE_TAG="${GITHUB_REF_NAME}"
          else
            RELEASE_VERSION="$APP_VERSION"
            RELEASE_TAG=""
          fi

          AUTO_START_DATE="${{ github.event.inputs.auto_start_date }}"
          if [ -z "$AUTO_START_DATE" ]; then AUTO_START_DATE="$DEFAULT_START_DATE"; fi

          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "app_id=$APP_ID" >> "$GITHUB_OUTPUT"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "app_slug=$APP_SLUG" >> "$GITHUB_OUTPUT"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "auto_start_date=$AUTO_START_DATE" >> "$GITHUB_OUTPUT"

      - name: Install Python dependencies
        run: pip install pillow

      - name: Generate static web content
        shell: bash
        run: |
          python ./main.py --auto-start-date "${{ steps.meta.outputs.auto_start_date }}"

      - name: Recreate Android platform
        shell: bash
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android

          # Verify web assets were actually copied
          ASSETS_DIR="android/app/src/main/assets/public"
          if [ ! -f "$ASSETS_DIR/index.html" ]; then
            echo "ERROR: web assets not synced – index.html missing in $ASSETS_DIR"
            exit 1
          fi
          echo "Web assets OK: $(find $ASSETS_DIR -type f | wc -l) files synced."

      - name: Generate Android launcher icons from PWA icon
        shell: bash
        run: |
          ICON_SRC="output/icons/icon-512.png"
          if [ ! -f "$ICON_SRC" ]; then
            echo "No icon-512.png found, using default Capacitor icon."
          else
            python3 - <<'PYEOF'
import subprocess, os
sizes = {"mdpi": 48, "hdpi": 72, "xhdpi": 96, "xxhdpi": 144, "xxxhdpi": 192}
for density, size in sizes.items():
    dst = f"android/app/src/main/res/mipmap-{density}/ic_launcher.png"
    os.makedirs(os.path.dirname(dst), exist_ok=True)
    subprocess.run(["python3", "-c", f"""
from PIL import Image
img = Image.open("output/icons/icon-512.png").convert("RGBA").resize(({size},{size}), Image.LANCZOS)
img.save("{dst}")
"""], check=True)
    print(f"Generated {dst} ({size}x{size})")
PYEOF
            echo "Android launcher icons generated."
          fi

      - name: Prepare signing material
        shell: bash
        run: |
          mkdir -p android/app
          echo "" | base64 --decode > android/app/release.keystore

          cat > android/keystore.properties <<EOF
          storeFile=../app/release.keystore
          storePassword=11891189
          keyAlias=smdj-gd
          keyPassword=11891189
          EOF

      - name: Inject release signing + version config
        shell: bash
        run: |
          cat > android/app/release-signing.gradle <<EOF
          def keystorePropertiesFile = rootProject.file("keystore.properties")
          def keystoreProperties = new Properties()
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
          }

          android {
              defaultConfig {
                  versionCode ${GITHUB_RUN_NUMBER}
                  versionName "${{ steps.meta.outputs.release_version }}"
              }

              signingConfigs {
                  release {
                      if (keystorePropertiesFile.exists()) {
                          storeFile file(keystoreProperties['storeFile'])
                          storePassword keystoreProperties['storePassword']
                          keyAlias keystoreProperties['keyAlias']
                          keyPassword keystoreProperties['keyPassword']
                      }
                  }
              }

              buildTypes {
                  release {
                      if (keystorePropertiesFile.exists()) {
                          signingConfig signingConfigs.release
                      }
                  }
              }
          }
          EOF

          if ! grep -q "apply from: 'release-signing.gradle'" android/app/build.gradle; then
            printf "\napply from: 'release-signing.gradle'\n" >> android/app/build.gradle
          fi

      - name: Build signed APK
        shell: bash
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew clean :app:assembleRelease --no-daemon

      - name: Collect APK
        id: collect
        shell: bash
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -maxdepth 1 -type f -name "*.apk" ! -name "*-unsigned.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK produced."
            exit 1
          fi

          APK_SIZE=$(stat -c%s "$APK_PATH")
          echo "APK size: $APK_SIZE bytes"
          if [ "$APK_SIZE" -lt 1048576 ]; then
            echo "ERROR: APK is only ${APK_SIZE} bytes (< 1MB) – likely missing web assets or signing failure."
            exit 1
          fi

          OUT_NAME="${{ steps.meta.outputs.app_slug }}-v${{ steps.meta.outputs.release_version }}.apk"
          cp "$APK_PATH" "$OUT_NAME"
          echo "apk_file=$OUT_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: ${{ steps.collect.outputs.apk_file }}

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          files: ${{ steps.collect.outputs.apk_file }}
          generate_release_notes: true
          body: |
            Android release APK built by GitHub Actions.

            - App: `${{ steps.meta.outputs.app_name }}`
            - App ID: `${{ steps.meta.outputs.app_id }}`
            - Version: `${{ steps.meta.outputs.release_version }}`
            - Start Date: `${{ steps.meta.outputs.auto_start_date }}`

      - name: Trigger site deploy workflow
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
              inputs: {
                auto_start_date: '${{ steps.meta.outputs.auto_start_date }}',
                source_ref: 'main'
              }
            });
